<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nihongo Memo — Learn Japanese</title>
  <meta name="description" content="Learn Japanese hiragana, katakana, and 1,200+ vocabulary words with spaced repetition. Free and open source.">

  <!-- Open Graph / Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nihongo-memo.pages.dev/">
  <meta property="og:title" content="Nihongo Memo — Learn Japanese">
  <meta property="og:description" content="Master hiragana, katakana, and 1,200+ vocabulary words with spaced repetition quizzes. Track your progress and learn at your own pace.">
  <meta property="og:image" content="https://nihongo-memo.pages.dev/preview.svg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nihongo Memo — Learn Japanese">
  <meta name="twitter:description" content="Master hiragana, katakana, and 1,200+ vocabulary words with spaced repetition quizzes.">
  <meta name="twitter:image" content="https://nihongo-memo.pages.dev/preview.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="theme-color" content="#1c1e26">

  <link rel="stylesheet" href="styles/main.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <div id="app">
    <!-- Auth Gate -->
    <div id="view-auth-gate" class="view">
      <div class="home-page">
        <h1 class="logo">日本語メモ</h1>
        <p class="tagline">Nihongo Memo</p>
        <p class="gate-text">Create an account or log in to start learning Japanese</p>
        <div class="gate-buttons">
          <button class="btn accent gate-btn" id="gate-register">Create Account</button>
          <button class="btn gate-btn" id="gate-login">Log In</button>
        </div>
      </div>
    </div>

    <!-- Home -->
    <div id="view-home" class="view">
      <div class="home-page">
        <h1 class="logo">日本語メモ</h1>
        <p class="tagline">Nihongo Memo</p>
        <div class="home-stats">
          <div class="home-stat"><span class="hs-num" id="hs-mastered">0</span><span class="hs-label">Mastered</span></div>
          <div class="home-stat"><span class="hs-num" id="hs-streak">0</span><span class="hs-label">Day Streak</span></div>
        </div>
        <div class="home-unit-nav">
          <button class="unit-arrow" id="unit-prev">&larr;</button>
          <div class="home-unit-box" id="home-unit-box">
            <div class="home-unit-name" id="home-unit-name"></div>
            <div class="home-unit-sub" id="home-unit-sub"></div>
            <div class="home-unit-pct" id="home-unit-pct"></div>
          </div>
          <button class="unit-arrow" id="unit-next">&rarr;</button>
        </div>
        <button class="start-btn" id="start-btn">Start Studying</button>
        <div class="auth-bar hidden" id="auth-bar"></div>
        <div class="auth-bar" id="auth-user-bar">
          <span class="auth-username" id="auth-username"></span>
          <button class="auth-link" id="auth-logout-btn">Log out</button>
        </div>
      </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay hidden" id="auth-modal">
      <div class="modal-box auth-box">
        <button class="modal-close" id="auth-close">&times;</button>
        <h2 id="auth-title">Log In</h2>
        <div class="auth-error hidden" id="auth-error"></div>
        <div class="auth-field hidden" id="auth-email-field">
          <label>Email</label>
          <input type="email" id="auth-email-input" placeholder="Email" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Username</label>
          <input type="text" id="auth-username-input" placeholder="Username" autocomplete="username">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="auth-password-input" placeholder="Password" autocomplete="current-password">
        </div>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADDUPaHvXfzTde9-" data-theme="dark" data-size="flexible" id="turnstile-widget"></div>
        <button class="btn accent auth-submit" id="auth-submit">Log In</button>
        <p class="auth-switch" id="auth-switch"></p>
      </div>
    </div>

    <!-- Unit -->
    <div id="view-unit" class="view">
      <button class="back-btn" id="unit-back">&larr; Back</button>
      <div class="unit-header">
        <div>
          <h1 id="unit-name" class="unit-name"></h1>
          <p id="unit-subtitle" class="unit-subtitle"></p>
        </div>
        <div class="unit-progress-ring">
          <span class="upr-num" id="unit-pct">0%</span>
          <span class="upr-label">mastered</span>
        </div>
      </div>

      <!-- Phases -->
      <div class="phase-list">
        <div class="phase-card" id="phase-kana">
          <div class="phase-left">
            <div class="phase-step">1</div>
            <div>
              <div class="phase-name" id="phase-kana-name">Learn Kana</div>
              <div class="phase-detail" id="phase-kana-detail"></div>
            </div>
          </div>
          <div class="phase-right">
            <div class="phase-status" id="phase-kana-status"></div>
            <div class="phase-bar"><div class="phase-bar-fill" id="phase-kana-bar"></div></div>
          </div>
        </div>

        <div class="phase-card" id="phase-vocab">
          <div class="phase-left">
            <div class="phase-step">2</div>
            <div>
              <div class="phase-name">Learn Vocabulary</div>
              <div class="phase-detail" id="phase-vocab-detail"></div>
            </div>
          </div>
          <div class="phase-right">
            <div class="phase-status" id="phase-vocab-status"></div>
            <div class="phase-bar"><div class="phase-bar-fill" id="phase-vocab-bar"></div></div>
          </div>
        </div>
      </div>

      <!-- Full hiragana chart -->
      <div class="unit-kana-chart" id="unit-kana-chart"></div>
    </div>

    <!-- Learn Phase: Teach -->
    <div id="view-teach" class="view">
      <div class="review-bar">
        <button class="back-btn" id="teach-exit">&larr; Exit</button>
        <span class="counter" id="teach-counter"></span>
      </div>
      <div class="card-area">
        <div class="teach-label" id="teach-label">New Character</div>
        <div class="teach-char" id="teach-char"></div>
        <div class="teach-rom" id="teach-rom"></div>
        <div class="teach-notes" id="teach-notes"></div>
        <button class="btn accent" id="teach-next">Next</button>
      </div>
    </div>

    <!-- Learn Phase: Quiz intro with card preview -->
    <div id="view-quiz-intro" class="view">
      <h2 style="margin-bottom:8px">Time to Practice</h2>
      <p class="muted" id="quiz-intro-text"></p>
      <div class="quiz-preview" id="quiz-preview"></div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn accent" id="quiz-intro-start">Start Quiz</button>
      </div>
    </div>

    <!-- Vocabulary Page (word list left, practice right) -->
    <div id="view-vocab" class="view">
      <button class="back-btn" id="vocab-back">&larr; Back</button>
      <h2 id="vocab-title"></h2>
      <div class="vocab-layout">
        <div class="vocab-left" id="vocab-sections"></div>
        <div class="vocab-right">
          <div class="vocab-practice-box">
            <h3 class="section-title">Practice</h3>
            <div class="vocab-practice-list" id="vocab-practice-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Multiple Choice -->
    <div id="view-mc" class="view">
      <div class="review-bar">
        <button class="back-btn" id="mc-exit">&larr; Exit</button>
        <span class="counter" id="mc-counter"></span>
      </div>
      <div class="card-area">
        <div class="card-big" id="mc-prompt"></div>
        <div class="card-small" id="mc-sub"></div>
        <button class="quiz-help-btn hidden" id="mc-help">?</button>
        <div class="mc-choices" id="mc-choices"></div>
      </div>
    </div>

    <!-- Flashcard -->
    <div id="view-flashcard" class="view">
      <div class="review-bar">
        <button class="back-btn" id="flash-exit">&larr; Exit</button>
        <span class="counter" id="flash-counter"></span>
      </div>
      <div class="card-area">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-front">
            <div class="card-big" id="flash-front"></div>
            <div class="card-small" id="flash-front-sub"></div>
          </div>
          <div class="flashcard-back">
            <div class="card-big" id="flash-back"></div>
            <div class="card-mid" id="flash-back-pron"></div>
            <div class="card-small" id="flash-back-notes"></div>
          </div>
        </div>
        <div class="card-hint">Click to flip</div>
      </div>
      <div class="nav-row">
        <button class="btn" id="flash-prev">&larr; Prev</button>
        <button class="btn" id="flash-next">Next &rarr;</button>
      </div>
    </div>

    <!-- Self-Graded -->
    <div id="view-self-quiz" class="view">
      <div class="review-bar">
        <button class="back-btn" id="sq-exit">&larr; Exit</button>
        <span class="counter" id="sq-counter"></span>
      </div>
      <div class="card-area">
        <div class="card-big" id="sq-prompt"></div>
        <div class="card-small" id="sq-sub"></div>
        <div class="answer-box hidden" id="sq-answer">
          <div class="card-big" id="sq-answer-main"></div>
          <div class="card-mid" id="sq-answer-pron"></div>
          <div class="card-small" id="sq-answer-notes"></div>
        </div>
        <button class="btn accent" id="sq-reveal">Reveal Answer</button>
        <button class="btn accent hidden" id="sq-continue">Continue</button>
      </div>
    </div>

    <!-- Typing -->
    <div id="view-typing" class="view">
      <div class="review-bar">
        <button class="back-btn" id="typ-exit">&larr; Exit</button>
        <span class="counter" id="typ-counter"></span>
      </div>
      <div class="card-area">
        <div class="card-big" id="typ-prompt"></div>
        <div class="card-small" id="typ-sub"></div>
        <button class="quiz-help-btn hidden" id="typ-help">?</button>
        <div class="input-row" id="typ-input-row">
          <input type="text" id="typ-input" placeholder="Type your answer..." autocomplete="off" spellcheck="false">
          <button class="btn accent" id="typ-submit">Check</button>
        </div>
        <div class="result-box hidden" id="typ-result">
          <div class="result-status" id="typ-status"></div>
          <div class="card-small" id="typ-correct"></div>
          <div class="card-small" id="typ-notes"></div>
          <button class="btn accent" id="typ-next">Next</button>
        </div>
      </div>
    </div>

    <!-- Complete -->
    <div id="view-complete" class="view">
      <div class="card-area">
        <h2 id="complete-heading">Session Complete</h2>
        <div class="complete-score" id="complete-score"></div>
        <div class="complete-detail" id="complete-detail"></div>
        <button class="btn accent" id="complete-home">Done</button>
      </div>
    </div>
  </div>

    <!-- Word Detail Modal -->
    <div class="modal-overlay hidden" id="word-modal">
      <div class="modal-box">
        <button class="modal-close" id="modal-close">&times;</button>
        <div class="modal-char" id="modal-char"></div>
        <div class="modal-rom" id="modal-rom"></div>
        <div class="modal-eng" id="modal-eng"></div>
        <div class="modal-section" id="modal-section"></div>
        <div class="modal-notes" id="modal-notes"></div>
        <div class="modal-examples" id="modal-examples"></div>
      </div>
    </div>

  <script src="scripts/data.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
